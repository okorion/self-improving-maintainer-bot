name: Documentation feedback
description: Report missing, confusing, or incorrect documentation.
labels: ["docs"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: docs/knowledge.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is confusing or incorrect?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should the documentation say?
