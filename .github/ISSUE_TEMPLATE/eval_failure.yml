name: Eval failure
description: Record a bot answer that should become an eval case.
labels: ["docs", "eval", "needs-review"]
body:
  - type: input
    id: eval-id
    attributes:
      label: Suggested eval id
      placeholder: install-002
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: User question
      description: The exact question the bot answered poorly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Required answer content
      description: Include exact commands, policy text, or filenames that must appear.
    validations:
      required: true
  - type: textarea
    id: forbidden
    attributes:
      label: Forbidden answer content
      description: Include dangerous or clearly wrong text that must not appear.
