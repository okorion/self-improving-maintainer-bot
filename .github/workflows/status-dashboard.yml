name: Status Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run dry-run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Update status dashboard
        run: python -m self_maintainer_bot.cli update-status

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: status-dashboard-eval-reports
          path: runs/docs-eval-*
          if-no-files-found: ignore

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "docs: update project status dashboard"
          title: "docs: update project status dashboard"
          body: |
            Updates the generated project status dashboard.
          branch: bot/status-dashboard
          add-paths: |
            docs/PROJECT_STATUS.md

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN missing::Set BOT_GITHUB_TOKEN to let generated PRs trigger normal PR checks."
