name: Status Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run dry-run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Update status dashboard
        run: python -m self_maintainer_bot.cli update-status

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: status-dashboard-eval-reports
          path: runs/docs-eval-*
          if-no-files-found: ignore

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "[docs] 프로젝트 상태 대시보드 갱신"
          title: "[docs] 프로젝트 상태 대시보드 갱신"
          body: |
            ## 목적

            생성된 프로젝트 상태 대시보드를 최신 eval 결과 기준으로 갱신합니다.
          branch: bot/status-dashboard
          add-paths: |
            docs/PROJECT_STATUS.md

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN 없음::자동 PR을 생성하려면 BOT_GITHUB_TOKEN을 설정하세요."
