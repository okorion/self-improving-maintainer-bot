name: Eval From Issue

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  add-eval:
    if: contains(github.event.issue.labels.*.name, 'eval')
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Write issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p work
          python - <<'PY'
          import os
          from pathlib import Path

          Path("work/issue-body.md").write_text(os.environ.get("ISSUE_BODY", ""), encoding="utf-8")
          PY

      - name: Add eval case from issue
        run: |
          python -m self_maintainer_bot.cli add-eval-from-issue \
            --body-file work/issue-body.md \
            --issue-number "${{ github.event.issue.number }}"

      - name: Validate eval file
        run: python -m self_maintainer_bot.cli validate-evals

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "[test] 이슈 기반 문서 eval 추가 #${{ github.event.issue.number }}"
          title: "[test] 이슈 기반 문서 eval 추가 #${{ github.event.issue.number }}"
          body: |
            ## 목적

            이슈 #${{ github.event.issue.number }}에서 제안된 문서 QA eval case를 추가합니다.

            ## 검토 사항

            - 기대 포함 문구가 실제 요구사항을 정확히 표현하는지 확인하세요.
            - 금지 문구가 너무 넓게 설정되어 정상 답변을 막지 않는지 확인하세요.
          branch: bot/add-eval-${{ github.event.issue.number }}
          add-paths: |
            evals/docs_qa.jsonl

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN 없음::자동 PR을 생성하려면 BOT_GITHUB_TOKEN을 설정하세요."
