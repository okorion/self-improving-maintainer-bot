name: Docs Bot Eval

on:
  pull_request:
  workflow_dispatch:
    inputs:
      use_openai:
        description: "Use OPENAI_API_KEY secret instead of dry-run mode"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run dry-run eval for pull requests
        if: github.event_name == 'pull_request' || inputs.use_openai == 'false'
        run: python -m maintainer_bot.cli eval-docs --dry-run

      - name: Run OpenAI eval for trusted manual runs
        if: github.event_name == 'workflow_dispatch' && inputs.use_openai == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: python -m maintainer_bot.cli eval-docs

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-eval-reports
          path: runs/docs-eval-*
          if-no-files-found: ignore
