name: Docs Bot Eval

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run local dry-run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-eval-reports
          path: runs/docs-eval-*
          if-no-files-found: ignore
