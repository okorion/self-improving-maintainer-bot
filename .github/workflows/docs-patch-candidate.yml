name: Docs Patch Candidate

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose-docs-patch:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run dry-run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Propose docs patch
        run: python -m self_maintainer_bot.cli propose-docs-patch

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "[docs] 실패 eval 기반 문서 후보 추가"
          title: "[docs] 실패 eval 기반 문서 후보 추가"
          body: |
            ## 목적

            실패한 eval case에서 필요한 문서 후보 문구를 추가합니다.

            ## 검토 사항

            - 생성 문구는 초안입니다. 병합 전에 사람이 문장과 위치를 검토하세요.
            - eval을 약화하거나 삭제하지 않았는지 확인하세요.
          branch: bot/docs-patch-candidate
          add-paths: |
            docs/knowledge.md

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN 없음::자동 PR을 생성하려면 BOT_GITHUB_TOKEN을 설정하세요."
