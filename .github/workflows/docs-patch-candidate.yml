name: Docs Patch Candidate

on:
  workflow_dispatch:
    inputs:
      use_openai:
        description: "Use OPENAI_API_KEY for eval before generating patch"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  propose-docs-patch:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run dry-run eval
        if: inputs.use_openai == 'false'
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Run OpenAI eval
        if: inputs.use_openai == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: python -m self_maintainer_bot.cli eval-docs --fail-under 0

      - name: Propose docs patch
        run: python -m self_maintainer_bot.cli propose-docs-patch

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "docs: add candidate fixes from failed evals"
          title: "docs: add candidate fixes from failed evals"
          body: |
            This PR adds candidate documentation text generated from failed eval cases.

            Review and edit the wording before merging. Do not merge generated wording blindly.
          branch: bot/docs-patch-candidate
          add-paths: |
            docs/knowledge.md

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN missing::Set BOT_GITHUB_TOKEN to let generated PRs trigger normal PR checks."
