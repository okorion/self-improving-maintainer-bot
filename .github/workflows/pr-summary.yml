name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Write PR summary
        run: |
          python -m maintainer_bot.cli summarize-pr \
            --base-ref "origin/${{ github.base_ref }}" \
            --head-ref "HEAD" \
            --output runs/pr-summary.md

      - name: Comment PR summary
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m maintainer_bot.cli comment-pr-summary \
            --repo "$GITHUB_REPOSITORY" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --summary-file runs/pr-summary.md

      - name: Upload PR summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-summary
          path: runs/pr-summary.md
          if-no-files-found: ignore
