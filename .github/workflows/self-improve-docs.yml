name: Self Improve Docs Proposal

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Write proposal
        run: python -m self_maintainer_bot.cli propose-improvement --dry-run

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "[docs] 자가 개선 제안 추가"
          title: "[docs] 자가 개선 제안 추가"
          body: |
            ## 목적

            자가 개선 workflow가 생성한 문서 개선 제안을 추가합니다.

            ## 검토 사항

            - 기본적으로 proposal/report 파일만 생성합니다.
            - 실제 docs, prompts, evals, code 변경에 적용하기 전에 사람이 내용을 검토하세요.
          branch: bot/self-improve-docs
          add-paths: |
            proposals/**

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN 없음::자동 PR을 생성하려면 BOT_GITHUB_TOKEN을 설정하세요."
