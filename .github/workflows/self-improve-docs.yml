name: Self Improve Docs Proposal

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    env:
      BOT_GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run eval
        run: python -m self_maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Write proposal
        run: python -m self_maintainer_bot.cli propose-improvement --dry-run

      - name: Create pull request
        if: env.BOT_GITHUB_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.BOT_GITHUB_TOKEN }}
          commit-message: "docs: add self-improvement proposal"
          title: "docs: add self-improvement proposal"
          body: |
            This PR was generated by the self-improvement workflow.

            It only writes proposal/report files by default. Review the proposal before applying changes to docs, prompts, evals, or code.
          branch: bot/self-improve-docs
          add-paths: |
            proposals/**

      - name: Skip pull request without bot token
        if: env.BOT_GITHUB_TOKEN == ''
        run: |
          echo "::notice title=BOT_GITHUB_TOKEN missing::Set BOT_GITHUB_TOKEN to let generated PRs trigger normal PR checks."
